[tools]
swift = "6.3"
hk = { version = "latest", postinstall = "hk install" }

# Build

[env]
[tasks.build]
description = "Build the Swift package"
usage = '''
arg "<config>" default="debug" help="Build configuration" {
  choices "debug" "release"
}
flag "-w --werror" help="Treat warnings as errors" default="true"
flag "-v --verbose" help="Show verbose build output" default="false"
'''
run = '''
echo "Building (config=${usage_config?}) werror=${usage_werror?}"
swift build -c "${usage_config?}" \
  ${usage_werror:+-Xswiftc -warnings-as-errors} \
  ${usage_verbose:+-v}
'''

# Test
[tasks.test]
description = "Run Swift tests"
usage = '''
arg "<config>" default="debug" help="Test configuration" {
  choices "debug" "release"
}
flag "-w --werror" help="Treat warnings as errors" default="true"
flag "-v --verbose" help="Show verbose build output" default="false"
flag "-c --coverage" help="Enable code coverage" default="false"
flag "--min <min>" help="Minimum coverage %" default="65"
flag "--enforce <enforce>" help="Enforce minimum coverage" default="false"
'''
run = '''
echo "Testing (config=${usage_config?}) werror=${usage_werror?} coverage=${usage_coverage?}"
swift test -c "${usage_config?}" \
  ${usage_werror:+-Xswiftc -warnings-as-errors} \
  ${usage_verbose:+-v} \
  ${usage_coverage:+--enable-code-coverage}

if [ "${usage_coverage?}" = "true" ]; then
  CODECOV_PATH="$(swift test -c "${usage_config?}" --show-codecov-path)"
  echo "Coverage report: $CODECOV_PATH"
  swift scripts/coverage.swift "$CODECOV_PATH" "${usage_min?}" "${usage_enforce?}" "$(pwd)"
fi
'''

# Format & Lint
[tasks.format]
description = "Format or lint source code"
usage = '''
flag "--check" help="Lint instead of format" default="false"
'''
run = '''
if [ "${usage_check?}" = "true" ]; then
  swift format lint --recursive --strict Sources Tests
else
  swift format --recursive -i Sources Tests
fi
'''

# Continuous Integration
[tasks.ci]
description = "Run all CI gates"
depends = [
  "format --check",
  "build",
  "test --coverage",
]
run = "echo CI completed successfully"

# Install
[tasks.install]
description = "Install the release binary"
usage = '''
arg "<binary_path>" default="bin" help="Installation directory"
'''
run = '''
set -euo pipefail
swift build -c release -Xswiftc -warnings-as-errors

mkdir -p "${usage_binary_path?}"

RELEASE_BIN=$(swift build -c release --show-bin-path)
install "$RELEASE_BIN/score" "${usage_binary_path?}/score" \
  || (echo "note: product 'score' not found; set PRODUCT=<swiftpm product name>." && exit 1)
'''

# Clean
[tasks.clean]
description = "Remove build artifacts"
run = '''
rm -rf bin
swift package clean
'''
